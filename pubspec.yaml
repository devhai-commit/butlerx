name: butlerx
description: "ButlerX - Trợ lý gia đình kỹ thuật số thông minh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  flex_color_scheme: ^8.0.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Data / Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4

  # Secure Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Auth & Backend
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1

  # OpenAI
  dart_openai: ^4.1.0

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0
  permission_handler: ^11.3.1
  record: ^5.1.2

  # Handwriting / OCR
  google_mlkit_digital_ink_recognition: ^0.14.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.69.0

  # Network
  dio: ^5.7.0

  # Utilities
  intl: ^0.20.0
  uuid: ^4.4.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  build_runner: ^2.4.12
  mocktail: ^1.0.4
  drift_dev: ^2.21.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/

  # fonts will be added via google_fonts package at runtime
  # font files can be added later to assets/fonts/ and declared here
